<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Feliz Día de la Mujer</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;600&family=Jost:wght@200;300&display=swap" rel="stylesheet">
<style>
  :root {
    --rose:  #c4637a;
    --deep:  #7a2840;
    --cream: #fff8f4;
    --gold:  #d4a96a;
    --text:  #3d1a26;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overscroll-behavior: none;
  }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--cream);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100dvh;
    padding: env(safe-area-inset-top, 16px) 20px env(safe-area-inset-bottom, 16px);
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── Noise grain overlay ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.035;
    pointer-events: none;
    z-index: 1000;
  }

  /* ── Background gradient mesh ── */
  .bg {
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 10% 5%,  #f9dde7 0%, transparent 60%),
      radial-gradient(ellipse 60% 70% at 95% 90%,  #fce4ec 0%, transparent 55%),
      radial-gradient(ellipse 55% 55% at 50% 50%,  #fff8f4 0%, #fde8ef 100%);
    z-index: 0;
  }

  /* ── Petal particles ── */
  .petals-container {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }

  .petal {
    position: absolute;
    background: radial-gradient(ellipse at 40% 30%, #f9c5d1, #e0748a);
    border-radius: 50% 50% 50% 0 / 60% 60% 40% 40%;
    opacity: 0;
    animation: petalFall linear infinite;
  }

  @keyframes petalFall {
    0%   { transform: translateY(-60px) translateX(0)    rotate(0deg)   scale(1);   opacity: 0; }
    10%  { opacity: .8; }
    50%  { transform: translateY(50vh)  translateX(20px) rotate(360deg) scale(.85); }
    80%  { opacity: .55; }
    100% { transform: translateY(110vh) translateX(-10px) rotate(720deg) scale(.5); opacity: 0; }
  }

  /* ── Main card ── */
  .card {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 400px;
    padding: 44px 28px 38px;
    background: rgba(255,255,255,.78);
    border: 1px solid rgba(196,99,122,.18);
    border-radius: 20px;
    backdrop-filter: blur(20px) saturate(1.5);
    -webkit-backdrop-filter: blur(20px) saturate(1.5);
    box-shadow:
      0 2px 0 rgba(212,169,106,.3),
      0 24px 60px rgba(122,40,64,.14),
      0 6px 20px rgba(122,40,64,.07);
    animation: cardReveal .85s cubic-bezier(.22,1,.36,1) both;
    overflow: hidden;
    text-align: center;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 12%; right: 12%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  @keyframes cardReveal {
    from { opacity: 0; transform: translateY(36px) scale(.96); }
    to   { opacity: 1; transform: translateY(0)    scale(1);   }
  }

  /* ── Floating hero icon ── */
  .hero-icon {
    font-size: 2.8rem;
    display: block;
    margin-bottom: 16px;
    animation: fadeUp .7s .1s both, floatIcon 4s ease-in-out 1s infinite;
  }
  @keyframes floatIcon {
    0%,100% { transform: translateY(0);    }
    50%      { transform: translateY(-6px); }
  }

  /* ── Date tag ── */
  .date-tag {
    font-family: 'Cinzel', serif;
    font-size: .6rem;
    font-weight: 600;
    letter-spacing: .22em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 14px;
    display: block;
    animation: fadeUp .7s .15s both;
  }

  /* ── Heading ── */
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: clamp(1.9rem, 9vw, 2.5rem);
    line-height: 1.15;
    color: var(--deep);
    animation: fadeUp .7s .2s both;
  }
  h1 span {
    display: block;
    font-style: normal;
    font-weight: 600;
    font-size: .38em;
    letter-spacing: .28em;
    text-transform: uppercase;
    color: var(--rose);
    margin-bottom: 4px;
    font-family: 'Cinzel', serif;
  }

  /* ── Subtitle ── */
  .subtitle {
    font-weight: 200;
    font-size: .78rem;
    color: var(--text);
    opacity: .6;
    letter-spacing: .1em;
    margin-top: 8px;
    animation: fadeUp .7s .3s both;
  }

  /* ── Divider ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 20px 0 22px;
    animation: fadeUp .7s .35s both;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(196,99,122,.35), transparent);
  }
  .divider-icon {
    font-size: .9rem;
    color: var(--rose);
    animation: heartPulse 2.4s ease-in-out infinite;
  }
  @keyframes heartPulse {
    0%,100% { transform: scale(1);   }
    50%      { transform: scale(1.3); }
  }

  /* ── Buttons ── */
  .btn-group {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .btn {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 17px 22px;
    background: transparent;
    border: 1px solid rgba(196,99,122,.28);
    border-radius: 12px;
    text-decoration: none;
    overflow: hidden;
    min-height: 58px;           /* comfortable touch target */
    transition: border-color .25s, box-shadow .25s, transform .12s;
    animation: fadeUp .7s both;
    user-select: none;
  }
  .btn:nth-child(1) { animation-delay: .45s; }
  .btn:nth-child(2) { animation-delay: .56s; }
  .btn:nth-child(3) { animation-delay: .67s; }

  /* fill layer */
  .btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(120deg, var(--rose), var(--deep));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform .35s cubic-bezier(.22,1,.36,1);
    z-index: 0;
    border-radius: inherit;
  }

  /* hover — desktop only */
  @media (hover: hover) {
    .btn:hover::before           { transform: scaleX(1); }
    .btn:hover                   { border-color: transparent; box-shadow: 0 6px 24px rgba(122,40,64,.2); }
    .btn:hover .btn-label,
    .btn:hover .btn-num          { color: #fff; }
    .btn:hover .btn-icon         { transform: translateX(4px) scale(1.15); color: #fff; }
  }

  /* active — touch feedback */
  .btn:active::before            { transform: scaleX(1); }
  .btn:active                    { transform: scale(.97); border-color: transparent; }
  .btn:active .btn-label,
  .btn:active .btn-num,
  .btn:active .btn-icon          { color: #fff; }

  .btn-num {
    font-family: 'Cinzel', serif;
    font-size: .57rem;
    letter-spacing: .18em;
    color: var(--gold);
    position: relative; z-index: 1;
    transition: color .25s;
    min-width: 26px;
    text-align: left;
  }
  .btn-label {
    flex: 1;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-style: italic;
    font-size: 1.1rem;
    color: var(--deep);
    position: relative; z-index: 1;
    transition: color .25s;
    text-align: center;
  }
  .btn-icon {
    font-size: 1.15rem;
    position: relative; z-index: 1;
    transition: transform .3s cubic-bezier(.22,1,.36,1), color .25s;
    color: var(--rose);
    min-width: 26px;
    text-align: right;
  }

  /* ── Ripple ── */
  .ripple {
    position: absolute;
    width: 8px; height: 8px;
    background: rgba(255,255,255,.5);
    border-radius: 50%;
    transform: scale(0);
    animation: rippleOut .5s ease-out forwards;
    pointer-events: none;
    z-index: 2;
  }
  @keyframes rippleOut { to { transform: scale(45); opacity: 0; } }

  /* ── Footer ── */
  .footer-note {
    margin-top: 24px;
    font-size: .63rem;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--rose);
    opacity: .5;
    animation: fadeUp .7s .78s both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0);    }
  }
</style>
</head>
<body>

<div class="bg"></div>
<div class="petals-container" id="petals"></div>

<div class="card">
  <span class="hero-icon">🌸</span>
  <span class="date-tag">8 de Marzo · 2025</span>

  <h1>
    <span>Día Internacional</span>
    de la Mujer
  </h1>
  <p class="subtitle">Un mensaje especial para ti</p>

  <div class="divider">
    <span class="divider-icon">♥</span>
  </div>

  <div class="btn-group">
    <a class="btn" href="carta.html">
      <span class="btn-num">01</span>
      <span class="btn-label">Siempre Contigo</span>
      <span class="btn-icon">💌</span>
    </a>
    <a class="btn" href="Tocame.html">
      <span class="btn-num">02</span>
      <span class="btn-label">Mi Luz</span>
      <span class="btn-icon">💖</span>
    </a>
    <a class="btn" href="CardYou.html">
      <span class="btn-num">03</span>
      <span class="btn-label">¿?</span>
      <span class="btn-icon">🌹</span>
    </a>
  </div>

  <p class="footer-note">con amor &nbsp;·&nbsp; siempre</p>
</div>

<script>
  /* ── Petal generator ── */
  const container = document.getElementById('petals');
  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    const size = Math.random() * 9 + 7;
    p.style.cssText = `
      left: ${Math.random() * 106}vw;
      width: ${size}px;
      height: ${size * 1.4}px;
      animation-duration: ${Math.random() * 9 + 8}s;
      animation-delay: ${Math.random() * 14}s;
      filter: hue-rotate(${Math.random() * 35 - 17}deg) brightness(${.88 + Math.random() * .22});
    `;
    container.appendChild(p);
  }

  /* ── Touch ripple ── */
  document.querySelectorAll('.btn').forEach(btn => {
    btn.addEventListener('pointerdown', function(e) {
      const r = document.createElement('span');
      r.className = 'ripple';
      const rect = btn.getBoundingClientRect();
      r.style.left = (e.clientX - rect.left - 4) + 'px';
      r.style.top  = (e.clientY - rect.top  - 4) + 'px';
      btn.appendChild(r);
      r.addEventListener('animationend', () => r.remove());
    });
  });
</script>
</body>
</html>
