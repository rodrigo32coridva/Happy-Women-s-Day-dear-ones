
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Para mi Amor 💌</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Pinyon+Script&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #fdf6ee;
      --rose: #c9697a;
      --deep: #7a2d3b;
      --gold: #c9a96e;
    }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 30% 20%, #fde8f0 0%, #fdf0e8 40%, #f0e8fd 100%);
      font-family: 'Cormorant Garamond', serif;
      overflow: hidden;
    }

    /* Pétalos */
    .petal {
      position: fixed;
      opacity: 0;
      animation: fall linear infinite;
      pointer-events: none;
    }
    @keyframes fall {
      0%   { transform: translateY(-60px) rotate(0deg);   opacity: 0.65; }
      100% { transform: translateY(110vh)  rotate(360deg); opacity: 0; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(-14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Título */
    .title-above {
      font-family: 'Pinyon Script', cursive;
      font-size: 2.4rem;
      color: var(--deep);
      margin-bottom: 28px;
      text-shadow: 0 2px 12px rgba(122,45,59,0.15);
      animation: fadeUp 1s ease both;
    }

    /*
      TRUCO FINAL:
      - .scene es el contenedor, position:relative, tamaño del sobre
      - La carta está en el DOM pero con clip-path:inset(100% 0 0 0)
        → completamente recortada (invisible), sin afectar z-index
      - Al abrir: clip-path se anima a inset(0) y la carta sube
      - El sobre vive en z-index mayor solo para tapar mientras clip cierra
    */

    .scene {
      position: relative;
      width: 360px;
      height: 240px;
      cursor: pointer;
      animation: fadeUp 1s ease 0.4s both;
      filter: drop-shadow(0 16px 36px rgba(122,45,59,0.22));
    }

    /* ── CARTA ── */
    .letter-card {
      position: absolute;
      left: 20px;
      top: 8px;
      width: 320px;
      background: var(--cream);
      border-radius: 6px;
      padding: 26px 24px 20px;
      border: 1px solid rgba(201,169,110,0.28);
      box-shadow: 0 2px 10px rgba(122,45,59,0.08);
      z-index: 30;

      /* Empieza recortada: invisible desde abajo hacia arriba */
      clip-path: inset(100% 0 0 0);
      transform: translateY(0px);

      transition:
        clip-path 0s linear 0s,       /* sin transición por defecto */
        transform  0.85s cubic-bezier(.3,0,.2,1),
        box-shadow 0.85s ease;
    }

    /* Al abrir: mostramos la carta y la subimos */
    .scene.open .letter-card {
      clip-path: inset(0% 0 0 0);     /* totalmente visible */
      transform: translateY(-140px);
      box-shadow: 0 28px 60px rgba(122,45,59,0.22);
      /* ahora sí animamos el clip (se abre instantáneo al empezar) */
      transition:
        clip-path 0s linear 0s,
        transform  0.85s cubic-bezier(.3,0,.2,1),
        box-shadow 0.85s ease;
    }

    /* ── SOBRE — SVG rellena todo el área, z-index encima de la carta ── */
    .env-svg {
      position: absolute;
      inset: 0;
      width: 360px;
      height: 240px;
      z-index: 20;
      pointer-events: none;
    }

    /* ── TAPA ── */
    .env-flap-svg {
      position: absolute;
      inset: 0;
      width: 360px;
      height: 240px;
      z-index: 22;
      pointer-events: none;
      transform-origin: 50% 0%;
      transition: transform 0.75s cubic-bezier(.4,0,.2,1);
    }
    .scene.open .env-flap-svg {
      transform: rotateX(-180deg);
    }

    /* ── SELLO ── */
    .seal {
      position: absolute;
      top: 48px; left: 50%;
      transform: translateX(-50%);
      width: 42px; height: 42px;
      background: radial-gradient(circle at 38% 35%, #eca865, #b35e28);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.25rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
      z-index: 23;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .scene.open .seal {
      opacity: 0;
      transform: translateX(-50%) scale(0.3);
    }

    /* ── CONTENIDO CARTA ── */
    .letter-ornament {
      text-align: center; font-size: 1.1rem;
      color: var(--gold); letter-spacing: 8px; margin-bottom: 6px;
    }
    .letter-greeting {
      font-family: 'Pinyon Script', cursive;
      font-size: 2rem; color: var(--deep);
      text-align: center; line-height: 1.2; margin-bottom: 8px;
    }
    .letter-divider {
      width: 60px; height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      margin: 0 auto 12px;
    }
    .letter-body {
      font-size: 1rem; color: #5a3040;
      line-height: 1.75; text-align: center; font-style: italic;
    }
    .letter-body strong { font-style: normal; color: var(--deep); font-weight: 600; }
    .letter-footer {
      margin-top: 12px; text-align: right;
      font-family: 'Pinyon Script', cursive;
      font-size: 1.5rem; color: var(--rose);
    }
    .letter-flowers { text-align: center; font-size: 1.3rem; margin-top: 8px; letter-spacing: 4px; }

    /* ── HINT ── */
    .hint {
      margin-top: 22px;
      font-family: 'Pinyon Script', cursive;
      font-size: 1.05rem; color: #b35b6f;
      letter-spacing: 2px;
      animation: fadeUp 1s ease 1.1s both;
      transition: opacity 0.4s;
      user-select: none;
    }
    .hint.hidden { opacity: 0; }
  </style>
</head>
<body>

  <div class="title-above">Para mi Amor</div>

  <div class="scene" id="scene">

    <!-- CARTA: clip-path la oculta al inicio, z-index:30 para salir encima -->
    <div class="letter-card">
      <div class="letter-ornament">❧ ✦ ❧</div>
      <div class="letter-greeting">¡Feliz Día de la Mujer!</div>
      <div class="letter-divider"></div>
      <p class="letter-body">
        Eres la mujer más especial de mi mundo.<br>
        Cada día a tu lado es un regalo que atesoro.<br><br>
        Gracias por iluminar mi vida con tu sonrisa,<br>
        por tu fuerza, tu ternura y tu magia.<br><br>
        <strong>Te amo más de lo que las palabras pueden decir.</strong>
      </p>
      <div class="letter-flowers">🌷 🌸 🌹</div>
      <div class="letter-footer">Con todo mi amor ♡</div>
    </div>

    <!-- SOBRE: z-index:20, tapa la carta (que está recortada de todas formas) -->
    <svg class="env-svg" viewBox="0 0 360 240" xmlns="http://www.w3.org/2000/svg">
      <rect width="360" height="240" rx="4" fill="#f0b8b8"/>
      <polygon points="0,240 360,240 180,115" fill="#e09090"/>
      <polygon points="0,0 0,240 180,120"     fill="#e8a0a0"/>
      <polygon points="360,0 360,240 180,120"  fill="#e8a0a0"/>
    </svg>

    <!-- TAPA: z-index:22, se voltea al abrir -->
    <svg class="env-flap-svg" viewBox="0 0 360 240" xmlns="http://www.w3.org/2000/svg">
      <polygon points="0,0 360,0 180,135" fill="#f4c0c0"/>
    </svg>

    <!-- SELLO: z-index:23 -->
    <div class="seal">💌</div>

  </div>


  <script>
    const scene = document.getElementById('scene');
    const hint  = document.getElementById('hint');

    scene.addEventListener('click', () => {
      scene.classList.toggle('open');
      hint.classList.add('hidden');
    });

    // Pétalos
    const emojis = ['🌸','🌺','✨','🌹','💮'];
    for (let i = 0; i < 16; i++) {
      const p = document.createElement('div');
      p.className = 'petal';
      p.textContent = emojis[i % emojis.length];
      p.style.cssText = `
        left: ${Math.random()*100}vw;
        font-size: ${0.7 + Math.random()*0.9}rem;
        animation-duration: ${6 + Math.random()*7}s;
        animation-delay: ${Math.random()*8}s;
      `;
      document.body.appendChild(p);
    }
  </script>

</body>
</html>
